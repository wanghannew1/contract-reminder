{% extends "base.html" %}

{% block title %}合同列表 - 合同提醒管理系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-files"></i> 合同管理</h2>
    <div>
        <a href="/contracts/import" class="btn btn-primary">
            <i class="bi bi-upload"></i> 导入CSV
        </a>
    </div>
</div>

<!-- 搜索和筛选 -->
<div class="card mb-4" x-data="contractSearch()">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label for="search" class="form-label">搜索</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="search" x-model="search"
                           placeholder="搜索员工姓名、身份证号、单位名称..." @keyup.enter="loadContracts()">
                    <button class="btn btn-outline-primary" @click="loadContracts()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>
            <div class="col-md-3">
                <label for="expire_within" class="form-label">到期筛选</label>
                <select class="form-select" id="expire_within" x-model="expire_within" @change="loadContracts()">
                    <option value="">全部</option>
                    <option value="30">30天内到期</option>
                    <option value="60">60天内到期</option>
                    <option value="90">90天内到期</option>
                </select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-outline-secondary w-100" @click="resetSearch()">
                    <i class="bi bi-arrow-counterclockwise"></i> 重置
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 合同列表 -->
<div class="card" x-data="contractList()">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">合同列表</h5>
        <span class="text-muted">共 <span x-text="total"></span> 条记录</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>员工姓名</th>
                        <th>身份证号</th>
                        <th>单位名称</th>
                        <th>合同类型</th>
                        <th>合同开始日期</th>
                        <th>合同到期日期</th>
                        <th>剩余天数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="contract in contracts" :key="contract.id">
                        <tr>
                            <td x-text="contract.employee_name"></td>
                            <td x-text="contract.id_number"></td>
                            <td x-text="contract.unit_name || '-'"></td>
                            <td><span class="badge bg-secondary" x-text="contract.contract_type || '-'"></span></td>
                            <td x-text="contract.contract_start_date || '-'"></td>
                            <td x-text="contract.contract_end_date || '-'"></td>
                            <td>
                                <span class="badge" :class="getExpiryBadgeClass(contract.days_until_expiry)"
                                      x-text="contract.days_until_expiry + '天'"></span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-danger btn-sm" title="删除"
                                            @click="deleteContract(contract.id, contract.employee_name)">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <template x-if="contracts.length === 0">
                        <tr>
                            <td colspan="8" class="text-center text-muted py-4">
                                <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                                <p class="mt-2 mb-0">暂无合同记录</p>
                                <a href="/contracts/import" class="btn btn-primary btn-sm mt-2">导入合同数据</a>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 分页 -->
    <div class="card-footer" x-show="totalPages > 1">
        <nav aria-label="合同分页">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" :class="{ disabled: page <= 1 }">
                    <a class="page-link" href="#" @click.prevent="changePage(page - 1)">上一页</a>
                </li>
                <template x-for="p in displayPages" :key="p">
                    <li class="page-item" :class="{ active: p === page }">
                        <a class="page-link" href="#" @click.prevent="changePage(p)" x-text="p"></a>
                    </li>
                </template>
                <li class="page-item" :class="{ disabled: page >= totalPages }">
                    <a class="page-link" href="#" @click.prevent="changePage(page + 1)">下一页</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- 删除确认模态框 -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title"><i class="bi bi-exclamation-triangle"></i> 确认删除</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>确定要删除合同 <strong id="deleteContractName"></strong> 吗？</p>
                <p class="text-muted">此操作不可恢复。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                    <i class="bi bi-trash"></i> 确认删除
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// 搜索状态管理
let searchState = {
    search: '',
    expire_within: '',
    page: 1,
    limit: 50
};

function contractSearch() {
    return {
        search: searchState.search,
        expire_within: searchState.expire_within,

        loadContracts() {
            searchState.search = this.search;
            searchState.expire_within = this.expire_within;
            searchState.page = 1;
            // 触发列表刷新
            window.dispatchEvent(new Event('load-contracts'));
        },

        resetSearch() {
            this.search = '';
            this.expire_within = '';
            this.loadContracts();
        }
    };
}

function contractList() {
    return {
        contracts: [],
        total: 0,
        page: 1,
        limit: 50,
        totalPages: 0,

        get displayPages() {
            const pages = [];
            const start = Math.max(1, this.page - 2);
            const end = Math.min(this.totalPages, this.page + 2);
            for (let i = start; i <= end; i++) {
                pages.push(i);
            }
            return pages;
        },

        async init() {
            await this.loadContracts();
            window.addEventListener('load-contracts', () => {
                this.page = searchState.page;
                this.limit = searchState.limit;
                this.loadContracts();
            });
        },

        async loadContracts() {
            try {
                let url = `/api/contracts?page=${this.page}&limit=${this.limit}`;
                if (searchState.search) url += `&search=${encodeURIComponent(searchState.search)}`;
                if (searchState.expire_within) url += `&expire_within=${searchState.expire_within}`;

                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    this.contracts = data.items || [];
                    this.total = data.total || 0;
                    this.totalPages = Math.ceil(this.total / this.limit);
                }
            } catch (error) {
                console.error('加载合同列表失败:', error);
            }
        },

        changePage(p) {
            if (p < 1 || p > this.totalPages) return;
            this.page = p;
            this.loadContracts();
        },

        getExpiryBadgeClass(days) {
            if (days <= 0) return 'bg-danger';
            if (days <= 30) return 'bg-warning text-dark';
            if (days <= 60) return 'bg-info';
            return 'bg-success';
        },

        deleteContract(id, name) {
            document.getElementById('deleteContractName').textContent = name;
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            modal.show();

            document.getElementById('confirmDeleteBtn').onclick = async () => {
                try {
                    const response = await fetch(`/api/contracts/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        modal.hide();
                        this.loadContracts();
                    } else {
                        alert('删除失败');
                    }
                } catch (error) {
                    alert('删除失败: ' + error.message);
                }
            };
        }
    };
}
</script>
{% endblock %}
