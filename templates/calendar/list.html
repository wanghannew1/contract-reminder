{% extends "base.html" %}

{% block title %}日程管理 - 合同提醒管理系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-calendar-event"></i> 日程管理</h2>
</div>

<!-- 搜索 -->
<div class="card mb-4" x-data="calendarSearch()">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label for="search" class="form-label">搜索</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="search" x-model="search"
                           placeholder="搜索员工姓名、单位名称..." @keyup.enter="loadEvents()">
                    <button class="btn btn-outline-primary" @click="loadEvents()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-outline-secondary w-100" @click="resetSearch()">
                    <i class="bi bi-arrow-counterclockwise"></i> 重置
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 日程列表 -->
<div class="card" x-data="calendarList()">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">日程列表</h5>
        <span class="text-muted">共 <span x-text="total"></span> 条记录</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>日程标题</th>
                        <th>关联合同</th>
                        <th>合同到期日</th>
                        <th>开始时间</th>
                        <th>重复规则</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="event in events" :key="event.id">
                        <tr>
                            <td x-text="event.summary"></td>
                            <td x-text="event.employee_name || '-'"></td>
                            <td x-text="event.contract_end_date || '-'"></td>
                            <td x-text="event.start_time || '-'"></td>
                            <td>
                                <span class="badge bg-info" x-text="formatRecurrence(event.recurrence)"></span>
                            </td>
                            <td x-text="event.created_at || '-'"></td>
                            <td>
                                <button type="button" class="btn btn-outline-danger btn-sm" title="删除"
                                        @click="deleteEvent(event.id, event.summary)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </template>
                    <template x-if="events.length === 0">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-calendar-x" style="font-size: 2rem;"></i>
                                <p class="mt-2 mb-0">暂无日程记录</p>
                                <p class="text-muted">请先在合同管理中为合同创建提醒</p>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 分页 -->
    <div class="card-footer" x-show="totalPages > 1">
        <nav aria-label="日程分页">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" :class="{ disabled: page <= 1 }">
                    <a class="page-link" href="#" @click.prevent="changePage(page - 1)">上一页</a>
                </li>
                <template x-for="p in displayPages" :key="p">
                    <li class="page-item" :class="{ active: p === page }">
                        <a class="page-link" href="#" @click.prevent="changePage(p)" x-text="p"></a>
                    </li>
                </template>
                <li class="page-item" :class="{ disabled: page >= totalPages }">
                    <a class="page-link" href="#" @click.prevent="changePage(page + 1)">下一页</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- 删除确认模态框 -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title"><i class="bi bi-exclamation-triangle"></i> 确认删除</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>确定要删除日程 <strong id="deleteEventTitle"></strong> 吗？</p>
                <p class="text-muted">此操作将同时删除钉钉端的日程。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                    <i class="bi bi-trash"></i> 确认删除
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// 搜索状态管理
let calendarSearchState = {
    search: '',
    page: 1,
    limit: 50
};

function calendarSearch() {
    return {
        search: calendarSearchState.search,

        loadEvents() {
            calendarSearchState.search = this.search;
            calendarSearchState.page = 1;
            window.dispatchEvent(new Event('load-events'));
        },

        resetSearch() {
            this.search = '';
            this.loadEvents();
        }
    };
}

function calendarList() {
    return {
        events: [],
        total: 0,
        page: 1,
        limit: 50,
        totalPages: 0,

        get displayPages() {
            const pages = [];
            const start = Math.max(1, this.page - 2);
            const end = Math.min(this.totalPages, this.page + 2);
            for (let i = start; i <= end; i++) {
                pages.push(i);
            }
            return pages;
        },

        async init() {
            await this.loadEvents();
            window.addEventListener('load-events', () => {
                this.page = calendarSearchState.page;
                this.limit = calendarSearchState.limit;
                this.loadEvents();
            });
        },

        async loadEvents() {
            try {
                let url = `/api/calendar/events?page=${this.page}&limit=${this.limit}`;
                if (calendarSearchState.search) url += `&search=${encodeURIComponent(calendarSearchState.search)}`;

                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    this.events = data.items || [];
                    this.total = data.total || 0;
                    this.totalPages = Math.ceil(this.total / this.limit);
                }
            } catch (error) {
                console.error('加载日程列表失败:', error);
            }
        },

        changePage(p) {
            if (p < 1 || p > this.totalPages) return;
            this.page = p;
            this.loadEvents();
        },

        formatRecurrence(recurrence) {
            if (!recurrence) return '不重复';
            if (recurrence.includes('FREQ=DAILY')) return '每天';
            if (recurrence.includes('FREQ=WEEKLY')) {
                const dayMatch = recurrence.match(/BYDAY=(\w+)/);
                if (dayMatch) {
                    const dayMap = { 'MO': '周一', 'TU': '周二', 'WE': '周三', 'TH': '周四', 'FR': '周五', 'SA': '周六', 'SU': '周日' };
                    return `每${dayMap[dayMatch[1]] || dayMatch[1]}`;
                }
                return '每周';
            }
            return recurrence;
        },

        deleteEvent(id, title) {
            document.getElementById('deleteEventTitle').textContent = title;
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            modal.show();

            document.getElementById('confirmDeleteBtn').onclick = async () => {
                try {
                    const response = await fetch(`/api/calendar/events/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        modal.hide();
                        this.loadEvents();
                    } else {
                        alert('删除失败');
                    }
                } catch (error) {
                    alert('删除失败: ' + error.message);
                }
            };
        }
    };
}
</script>
{% endblock %}
