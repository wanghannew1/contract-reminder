{% extends "base.html" %}

{% block title %}主面板 - 合同提醒管理系统{% endblock %}

{% block content %}
<div class="row mb-4" x-data="dashboardData()">
    <div class="col-md-12">
        <h2><i class="bi bi-speedometer2"></i> 主面板</h2>
        <p class="text-muted">欢迎回来，{{ current_user.name }}！以下是您的合同概况。</p>
    </div>

    <!-- 统计卡片 -->
    <div class="col-md-3">
        <div class="card border-primary">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted mb-2">合同总数</h6>
                        <h3 class="mb-0" x-text="stats.total || 0"></h3>
                    </div>
                    <div class="text-primary">
                        <i class="bi bi-files" style="font-size: 2.5rem;"></i>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-transparent border-primary">
                <a href="/contracts" class="text-primary">查看全部</a>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-success">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted mb-2">有效合同</h6>
                        <h3 class="mb-0 text-success" x-text="stats.active || 0"></h3>
                    </div>
                    <div class="text-success">
                        <i class="bi bi-check-circle" style="font-size: 2.5rem;"></i>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-transparent border-success">
                <a href="/contracts" class="text-success">查看全部</a>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-warning">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted mb-2">即将到期</h6>
                        <h3 class="mb-0 text-warning" x-text="stats.expiring_soon || 0"></h3>
                    </div>
                    <div class="text-warning">
                        <i class="bi bi-exclamation-circle" style="font-size: 2.5rem;"></i>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-transparent border-warning">
                <a href="/contracts?expire_within=60" class="text-warning">查看全部</a>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-danger">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted mb-2">已过期</h6>
                        <h3 class="mb-0 text-danger" x-text="stats.expired || 0"></h3>
                    </div>
                    <div class="text-danger">
                        <i class="bi bi-x-circle" style="font-size: 2.5rem;"></i>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-transparent border-danger">
                <a href="/contracts" class="text-danger">查看全部</a>
            </div>
        </div>
    </div>

    <!-- 即将到期的合同 -->
    <div class="col-md-6 mb-4 mt-4">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 即将到期的合同</h5>
            </div>
            <div class="card-body">
                <template x-if="expiring_contracts.length === 0">
                    <p class="text-muted mb-0">暂无即将到期的合同</p>
                </template>
                <template x-if="expiring_contracts.length > 0">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>员工姓名</th>
                                    <th>单位</th>
                                    <th>到期日期</th>
                                    <th>剩余天数</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="contract in expiring_contracts" :key="contract.id">
                                    <tr>
                                        <td x-text="contract.employee_name"></td>
                                        <td x-text="contract.unit_name || '-'"></td>
                                        <td x-text="contract.contract_end_date"></td>
                                        <td>
                                            <span class="badge bg-warning text-dark" x-text="contract.days_until_expiry + '天'"></span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
            <div class="card-footer bg-transparent">
                <a href="/contracts?expire_within=60" class="text-warning">查看全部即将到期合同</a>
            </div>
        </div>
    </div>

    <!-- 近期日程 -->
    <div class="col-md-6 mb-4 mt-4">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0"><i class="bi bi-calendar-event"></i> 近期日程</h5>
            </div>
            <div class="card-body">
                <template x-if="upcoming_events.length === 0">
                    <p class="text-muted mb-0">暂无近期日程</p>
                </template>
                <template x-if="upcoming_events.length > 0">
                    <div class="list-group list-group-flush">
                        <template x-for="event in upcoming_events" :key="event.id">
                            <div class="list-group-item">
                                <div class="d-flex w-100 justify-content-between align-items-center">
                                    <h6 class="mb-1" x-text="event.summary"></h6>
                                    <small class="text-muted" x-text="event.start_time"></small>
                                </div>
                                <small class="text-info" x-text="event.employee_name || '无关联合同'"></small>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
            <div class="card-footer bg-transparent">
                <a href="/calendar" class="text-info">查看全部日程</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function dashboardData() {
    return {
        stats: {
            total: 0,
            active: 0,
            expiring_soon: 0,
            expired: 0
        },
        expiring_contracts: [],
        upcoming_events: [],

        async init() {
            await this.loadStats();
            await this.loadExpiringContracts();
            await this.loadUpcomingEvents();
        },

        async loadStats() {
            try {
                const response = await fetch('/api/contracts/stats');
                if (response.ok) {
                    this.stats = await response.json();
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        },

        async loadExpiringContracts() {
            try {
                const response = await fetch('/api/contracts?expire_within=30&limit=5');
                if (response.ok) {
                    const data = await response.json();
                    this.expiring_contracts = data.items || [];
                }
            } catch (error) {
                console.error('加载即将到期合同失败:', error);
            }
        },

        async loadUpcomingEvents() {
            try {
                const response = await fetch('/api/calendar/events?limit=5');
                if (response.ok) {
                    const data = await response.json();
                    this.upcoming_events = data.items || [];
                }
            } catch (error) {
                console.error('加载近期日程失败:', error);
            }
        }
    };
}
</script>
{% endblock %}
